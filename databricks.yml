# Databricks Asset Bundle configuration for the DPP Solution Accelerator
# See https://docs.databricks.com/dev-tools/bundles/index.html
#
# Deploy with: databricks bundle deploy -t dev
# Workspace host is taken from your active Databricks CLI profile.
# Override per target if you need to pin a specific workspace.

bundle:
  name: dpp-solution-accelerator

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog name for pipeline output
    default: dpp_dev
  schema:
    description: Schema within the catalog
    default: dpp
  profile:
    description: >
      Industry profile for synthetic data: battery | furniture. The schema,
      pipeline, apps and dashboard are domain-agnostic; only the seeded data
      differs. Add more profiles in 02_synthetic_data_generator.py.
    default: battery
  lakebase_instance_name:
    description: Lakebase Provisioned instance name (created out-of-band, see README)
    default: dpp-passport
  lakebase_database:
    description: >
      Lakebase PostgreSQL database name. Defaults to the database that every
      Lakebase instance ships with, so no CREATE DATABASE step is needed.
    default: databricks_postgres
  dashboard_warehouse_id:
    description: >
      SQL warehouse ID backing the AI/BI dashboard (and Genie space).
      Workspace-specific -- you MUST set this, e.g.
      `databricks bundle deploy --var="dashboard_warehouse_id=$(databricks warehouses list -o json | jq -r '.[0].id')"`.
    default: REPLACE_WITH_YOUR_WAREHOUSE_ID
  prod_sp_name:
    description: Service principal name used by the prod target
    default: dpp-prod-sp

# NOTE: dashboard_warehouse_id is workspace-specific and has no safe default, so
# it is NOT set per target below. You MUST pass it on every deploy, e.g.
#   databricks bundle deploy -t <target> --var="dashboard_warehouse_id=<id>"
# or set it in the Asset Bundle Editor's variables panel. Deploying without it
# ships the dashboard against the REPLACE_WITH_YOUR_WAREHOUSE_ID placeholder.
targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: dpp_dev
      schema: dpp

  staging:
    mode: development
    variables:
      catalog: dpp_staging
      schema: dpp

  prod:
    mode: production
    variables:
      catalog: dpp
      schema: dpp
    run_as:
      service_principal_name: ${var.prod_sp_name}
