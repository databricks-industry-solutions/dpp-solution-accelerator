# DPP Compliance Explorer -- Genie Space definition (source of truth)
#
# Genie spaces are not yet a native Databricks Asset Bundle resource type, so
# this YAML is the version-controlled spec. Apply it after `bundle deploy`
# using the Databricks AI Dev Kit genie tooling (create_or_update_genie) or the
# Genie REST API, pointing at the catalog/schema for your target.
#
# Table identifiers use ${var.catalog}.${var.schema} to match the bundle target;
# substitute your catalog/schema when creating the space.
title: "DPP Compliance Explorer"
warehouse_id: ${var.dashboard_warehouse_id}

description: |
  Natural language exploration of Digital Product Passport data for a fictional
  manufacturer (VoltCore Energy AB in the default battery profile, NordicForm AB
  in the furniture profile). Ask about product compliance, environmental
  impact, supply chain risk, material composition, and circularity.

  Key concepts:
  - passport_status: active, draft, expired, revoked
  - Compliance: compliant, pending, non_compliant, expired
  - Risk categories: CRITICAL, HIGH, MEDIUM, LOW
  - Supply chain: Tier 1 (direct), Tier 2 (sub-supplier), Tier 3 (raw material)
  - Carbon footprint in kg CO2e: manufacturing, transport, use_phase, end_of_life
  - Repairability: 0-10 scale
  - All data is synthetic, generated by the bundle's setup job

# Curated tables (Gold = business-friendly, Silver = detail/drill-down).
tables:
  - ${var.catalog}.${var.schema}.gold_passport_complete
  - ${var.catalog}.${var.schema}.gold_compliance_gap_analysis
  - ${var.catalog}.${var.schema}.gold_carbon_by_category
  - ${var.catalog}.${var.schema}.gold_carbon_by_product
  - ${var.catalog}.${var.schema}.gold_supply_chain_lineage
  - ${var.catalog}.${var.schema}.gold_supply_chain_summary
  - ${var.catalog}.${var.schema}.gold_supplier_traceability
  - ${var.catalog}.${var.schema}.gold_material_composition_trends
  - ${var.catalog}.${var.schema}.gold_circularity_metrics
  - ${var.catalog}.${var.schema}.silver_product_passport
  - ${var.catalog}.${var.schema}.silver_supplier

# Curated sample questions shown in the space.
sample_questions:
  - "How many products are in each compliance status?"
  - "Which products have certifications expiring in the next 30 days?"
  - "What is the average carbon footprint by product category?"
  - "Which lifecycle phase contributes most to carbon emissions per category?"
  - "List the highest-risk suppliers and the products that depend on them."
  - "Which countries do our Tier 1 suppliers come from?"
  - "Trace the full upstream supply chain for products with a Tier 3 supplier."
  - "What share of materials is recycled or renewable by category?"
  - "Which product categories have the highest circularity index?"
  - "How many passports are incomplete (missing serial number or facility)?"
